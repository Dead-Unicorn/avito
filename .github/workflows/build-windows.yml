name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "WebP2JPG_YaDisk" webp_to_jpg_yadisk_gui_v5.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebP2JPG_YaDisk-windows
          path: dist/WebP2JPG_YaDisk.exe
